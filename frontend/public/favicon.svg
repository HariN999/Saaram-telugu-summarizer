<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <style>
    .brand-text { fill: #F8FAFC; }
    @media (prefers-color-scheme: light) {
      .brand-text { fill: #0B1120; }
    }
  </style>

  <!-- Transparent background: Blends seamlessly with browser tab bar -->
  
  <!-- Bold Brand 'S' glyph -->
  <text x="190" y="385" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="400" font-weight="900" class="brand-text" text-anchor="middle">S</text>

  <!-- Signature Brand Dot in Primary Amber (#D89B2B) -->
  <circle cx="400" cy="340" r="48" fill="#D89B2B"/>
</svg>
