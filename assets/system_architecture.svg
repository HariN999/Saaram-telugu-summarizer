<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ── React.js Frontend (top-left, purple) ── -->
<g style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
  <rect x="30" y="30" width="140" height="64" rx="6" stroke-width="0.8" style="fill:rgb(60, 52, 137);stroke:rgb(175, 169, 236);stroke-width:0.8px;"/>
  <text x="100" y="52" text-anchor="middle" dominant-baseline="central" style="fill:rgb(206, 203, 246);font-size:14px;font-weight:500;text-anchor:middle;">React.js frontend</text>
  <text x="100" y="72" text-anchor="middle" dominant-baseline="central" style="fill:rgb(175, 169, 236);font-size:12px;font-weight:400;text-anchor:middle;">Input | Method |</text>
  <text x="100" y="86" text-anchor="middle" dominant-baseline="central" style="fill:rgb(175, 169, 236);font-size:12px;font-weight:400;text-anchor:middle;">Summary | Audio</text>
</g>

<!-- Axios JSON arrow: Frontend → FastAPI -->
<line x1="170" y1="62" x2="240" y2="62" marker-end="url(#arrow)" stroke="#7F77DD" style="fill:none;stroke-width:1.5px;"/>
<text x="205" y="55" text-anchor="middle" style="fill:rgb(194, 192, 182);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;font-weight:400;text-anchor:middle;">Axios JSON</text>

<!-- ── FastAPI Backend (top-right, amber) ── -->
<g style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:16px;font-weight:400;">
  <rect x="240" y="30" width="160" height="64" rx="6" stroke-width="0.8" style="fill:rgb(99, 56, 6);stroke:rgb(239, 159, 39);stroke-width:0.8px;"/>
  <text x="320" y="50" text-anchor="middle" dominant-baseline="central" style="fill:rgb(250, 199, 117);font-size:14px;font-weight:500;text-anchor:middle;">FastAPI backend</text>
  <text x="320" y="72" text-anchor="middle" dominant-baseline="central" style="fill:rgb(239, 159, 39);font-size:12px;font-weight:400;text-anchor:middle;">Pydantic | Router | Dispatch</text>
</g>

<!-- ── Dashed Groups ── -->
<!-- Input Processing dashed group -->
<rect x="22" y="132" width="190" height="142" rx="8" fill="none" stroke="#D85A30" stroke-width="0.8" stroke-dasharray="5 3"/>
<text x="117" y="284" text-anchor="middle" fill="#993C1D" style="fill:rgb(194, 192, 182);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;text-anchor:middle;">Input processing</text>

<!-- Summarization dashed group -->
<rect x="215" y="132" width="350" height="142" rx="8" fill="none" stroke="#1D9E75" stroke-width="0.8" stroke-dasharray="5 3"/>
<text x="390" y="284" text-anchor="middle" fill="#0F6E56" style="fill:rgb(194, 192, 182);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;text-anchor:middle;">Summarization</text>

<!-- Audio dashed group -->
<rect x="570" y="132" width="88" height="142" rx="8" fill="none" stroke="#378ADD" stroke-width="0.8" stroke-dasharray="5 3"/>
<text x="614" y="284" text-anchor="middle" fill="#185FA5" style="fill:rgb(194, 192, 182);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:12px;text-anchor:middle;">Audio</text>

<!-- ── PIPELINE NODES ── -->

<!-- ── Extraction (white/gray) ── -->
<g style="font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
  <rect x="30" y="175" width="80" height="56" rx="6" stroke-width="0.8" style="fill:rgb(68, 68, 65);stroke:rgb(180, 178, 169);stroke-width:0.8px;"/>
  <text x="70" y="197" text-anchor="middle" dominant-baseline="central" style="fill:rgb(211, 209, 199);font-size:13px;font-weight:500;">Extraction</text>
  <text x="70" y="213" text-anchor="middle" dominant-baseline="central" style="fill:rgb(180, 178, 169);font-size:11px;font-weight:400;">BS4</text>
</g>

<!-- Extraction → Cleaning arrow -->
<line x1="110" y1="203" x2="125" y2="203" marker-end="url(#arrow)" stroke="#888780" style="fill:none;stroke-width:1.5px;"/>

<!-- ── Cleaning (green tint) ── -->
<g style="font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
  <rect x="125" y="175" width="80" height="56" rx="6" stroke-width="0.8" style="fill:rgb(8, 80, 65);stroke:rgb(93, 202, 165);stroke-width:0.8px;"/>
  <text x="165" y="193" text-anchor="middle" dominant-baseline="central" style="fill:rgb(159, 225, 203);font-size:13px;font-weight:500;">Cleaning</text>
  <text x="165" y="207" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93, 202, 165);font-size:11px;font-weight:400;">Telugu</text>
  <text x="165" y="219" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93, 202, 165);font-size:11px;font-weight:400;">Regex</text>
</g>

<!-- Cleaning → Adaptive Router arrow -->
<line x1="205" y1="203" x2="220" y2="203" marker-end="url(#arrow)" stroke="#888780" style="fill:none;stroke-width:1.5px;"/>

<!-- ── Adaptive Router (green tint) ── -->
<g style="font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
  <rect x="220" y="175" width="100" height="56" rx="6" stroke-width="0.8" style="fill:rgb(8, 80, 65);stroke:rgb(93, 202, 165);stroke-width:0.8px;"/>
  <text x="270" y="193" text-anchor="middle" dominant-baseline="central" style="fill:rgb(159, 225, 203);font-size:13px;font-weight:500;">Adaptive Router</text>
  <text x="270" y="207" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93, 202, 165);font-size:11px;font-weight:400;">Length &amp;</text>
  <text x="270" y="219" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93, 202, 165);font-size:11px;font-weight:400;">Variance</text>
</g>

<!-- Adaptive Router → TF-IDF V2 branch (Up-Right Diagonal) -->
<line x1="320" y1="195" x2="335" y2="173" marker-end="url(#arrow)" stroke="#888780" style="fill:none;stroke-width:1.5px;"/>

<!-- Adaptive Router → mT5 Base branch (Down-Right Diagonal) -->
<line x1="320" y1="211" x2="335" y2="233" marker-end="url(#arrow)" stroke="#888780" style="fill:none;stroke-width:1.5px;"/>

<!-- ── TF-IDF V2 (white/gray) ── -->
<g style="font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
  <rect x="335" y="145" width="110" height="56" rx="6" stroke-width="0.8" style="fill:rgb(68, 68, 65);stroke:rgb(180, 178, 169);stroke-width:0.8px;"/>
  <text x="390" y="167" text-anchor="middle" dominant-baseline="central" style="fill:rgb(211, 209, 199);font-size:13px;font-weight:500;">TF-IDF V2</text>
  <text x="390" y="183" text-anchor="middle" dominant-baseline="central" style="fill:rgb(180, 178, 169);font-size:11px;font-weight:400;">(char n-gram)</text>
</g>

<!-- ── mT5 Base (white/gray) ── -->
<g style="font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
  <rect x="335" y="210" width="110" height="56" rx="6" stroke-width="0.8" style="fill:rgb(68, 68, 65);stroke:rgb(180, 178, 169);stroke-width:0.8px;"/>
  <text x="390" y="232" text-anchor="middle" dominant-baseline="central" style="fill:rgb(211, 209, 199);font-size:13px;font-weight:500;">mT5 Base</text>
  <text x="390" y="248" text-anchor="middle" dominant-baseline="central" style="fill:rgb(180, 178, 169);font-size:11px;font-weight:400;">(XLSum)</text>
</g>

<!-- mT5 Base → mT5 FT dashed line (Manual override) -->
<line x1="445" y1="238" x2="465" y2="238" marker-end="url(#arrow)" stroke="#888780" stroke-dasharray="3 3" style="fill:none;stroke-width:1.2px;"/>
<text x="455" y="230" text-anchor="middle" style="fill:rgb(180,178,169);font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;font-size:9px;font-style:italic;">manual</text>

<!-- ── mT5 Fine-Tuned (white/gray) ── -->
<g style="font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
  <rect x="465" y="210" width="100" height="56" rx="6" stroke-width="0.8" style="fill:rgb(68, 68, 65);stroke:rgb(180, 178, 169);stroke-width:0.8px;"/>
  <text x="515" y="228" text-anchor="middle" dominant-baseline="central" style="fill:rgb(211, 209, 199);font-size:13px;font-weight:500;">mT5 Fine-Tuned</text>
  <text x="515" y="246" text-anchor="middle" dominant-baseline="central" style="fill:rgb(180, 178, 169);font-size:11px;font-weight:400;">(8-bit LoRA)</text>
</g>

<!-- TF-IDF V2 → Edge TTS (Diagonal Down-Right) -->
<line x1="445" y1="173" x2="580" y2="201" marker-end="url(#arrow)" stroke="#888780" style="fill:none;stroke-width:1.5px;"/>

<!-- mT5 FT → Edge TTS (Diagonal Up-Right) -->
<line x1="565" y1="238" x2="580" y2="205" marker-end="url(#arrow)" stroke="#888780" style="fill:none;stroke-width:1.5px;"/>

<!-- ── Edge TTS (blue) ── -->
<g style="font-family:'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
  <rect x="580" y="175" width="70" height="56" rx="6" stroke-width="0.8" style="fill:rgb(12, 68, 124);stroke:rgb(133, 183, 235);stroke-width:0.8px;"/>
  <text x="615" y="193" text-anchor="middle" dominant-baseline="central" style="fill:rgb(181, 212, 244);font-size:13px;font-weight:500;">Edge TTS</text>
  <text x="615" y="207" text-anchor="middle" dominant-baseline="central" style="fill:rgb(133, 183, 235);font-size:11px;font-weight:400;">Voice Audio</text>
  <text x="615" y="219" text-anchor="middle" dominant-baseline="central" style="fill:rgb(133, 183, 235);font-size:11px;font-weight:400;">MP3</text>
</g>

<!-- FastAPI dispatch arrow down-left to Extraction (L-bend) -->
<path d="M320 94 L320 120 L70 120 L70 175" fill="none" stroke="#BA7517" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="4 2" style="fill:none;stroke-width:1px;"/>

<!-- TTS return arrow up to FastAPI (L-bend right side) -->
<path d="M615 175 L615 110 L400 110 L400 94" fill="none" stroke="#378ADD" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="4 2" style="fill:none;stroke-width:1px;"/>

</svg>